<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uz Taxi | Buyurtma Berish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .taxi-card { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.98); }
    </style>
</head>
<body class="bg-slate-200 text-slate-900">

    <header class="gradient-bg p-8 text-white shadow-xl rounded-b-[3.5rem] border-b-4 border-yellow-500">
        <div class="container mx-auto flex flex-col items-center">
            <div class="bg-yellow-500 p-4 rounded-2xl shadow-lg mb-3 rotate-3">
                <i class="fa fa-taxi text-slate-900 text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter italic uppercase">UZ <span class="text-yellow-500">TAXI</span></h1>
            <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-slate-400 mt-1">Tezkor va xavfsiz xizmat</p>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 -mt-6">
        <a href="tel:+998993390107" class="flex items-center justify-between bg-white p-5 rounded-3xl shadow-2xl border-l-8 border-yellow-500 active:scale-95 transition-all">
            <div class="flex items-center gap-4">
                <div class="bg-slate-100 p-3 rounded-2xl">
                    <i class="fa fa-phone-alt text-yellow-600"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Operator raqami</p>
                    <p class="text-lg font-black text-slate-800">99 339 01 07</p>
                </div>
            </div>
            <i class="fa fa-chevron-right text-slate-300"></i>
        </a>
    </div>

    <main class="container mx-auto p-6 flex justify-center">
        <div class="taxi-card w-full max-w-md rounded-[3rem] shadow-2xl p-8 border border-white">
            <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-8 bg-yellow-500 rounded-full"></span>
                Buyurtma berish
            </h2>

            <form id="taxiForm" class="space-y-4">
                <div class="relative">
                    <i class="fa fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="userName" placeholder="Ism va telefon raqam" required 
                    class="w-full pl-12 pr-4 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-semibold">
                </div>

                <div class="relative">
                    <i class="fa fa-map-marker-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="userDest" placeholder="Qayerdan qayerga?" required 
                    class="w-full pl-12 pr-4 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-semibold">
                </div>

                <div class="relative">
                    <i class="fa fa-list absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <select id="userTarif" class="w-full pl-12 pr-4 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-bold text-slate-700 appearance-none">
                        <option value="Ekonom - 140,000">🚕 Ekonom — 140,000</option>
                        <option value="Komfort - 180,000" selected>✨ Komfort — 180,000</option>
                        <option value="Biznes - 250,000">👑 Biznes — 250,000</option>
                        <option value="Pochta - 60,000">📦 Pochta yuborish</option>
                    </select>
                </div>

                <textarea id="userMsg" placeholder="Qo'shimcha izoh (ixtiyoriy)" 
                class="w-full p-4 bg-slate-100 border-none rounded-2xl h-24 focus:ring-2 focus:ring-yellow-500 outline-none font-semibold"></textarea>

                <button type="submit" id="submitBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black py-5 rounded-[2rem] text-xl shadow-lg shadow-yellow-500/30 active:scale-95 transition-all uppercase">
                    Yo'lga chiqish <i class="fa fa-paper-plane ml-2"></i>
                </button>
            </form>
        </div>
    </main>

    <script>
        // --- BOT SOZLAMALARI ---
        const BOT_TOKEN = "8777026295:AAF6wzaerpOem9_8Bm5QnZ4n0Kba-UZhrws";
        const ADMIN_ID = "8514630685";

        document.getElementById('taxiForm').onsubmit = async (e) => {
            e.preventDefault();
            const sBtn = document.getElementById('submitBtn');
            sBtn.innerText = "YUBORILMOQDA...";
            sBtn.disabled = true;

            const name = document.getElementById('userName').value;
            const dest = document.getElementById('userDest').value;
            const tarif = document.getElementById('userTarif').value;
            const msg = document.getElementById('userMsg').value || "Yo'q";

            const fullText = `🚕 *UZ TAXI | YANGI BUYURTMA*\n\n` +
                             `👤 *Mijoz:* ${name}\n` +
                             `📍 *Yo'nalish:* ${dest}\n` +
                             `🏷️ *Tarif:* ${tarif}\n` +
                             `💬 *Izoh:* ${msg}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: ADMIN_ID, 
                        text: fullText, 
                        parse_mode: "Markdown" 
                    })
                });

                if (response.ok) {
                    alert("✅ Buyurtmangiz qabul qilindi! Operator tez orada aloqaga chiqadi.");
                    location.reload();
                } else {
                    alert("⚠️ Xatolik! Botga /start bosganingizni tekshiring.");
                    sBtn.disabled = false;
                    sBtn.innerText = "Yo'lga chiqish";
                }
            } catch (err) {
                alert("❌ Internet aloqasi yo'q!");
                sBtn.disabled = false;
                sBtn.innerText = "Yo'lga chiqish";
            }
        };
    </script>
</body>
    </html>
