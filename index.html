<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uz Taxi | 94 666 40 42</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f4f6; }
        .taxi-gradient { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100">

    <header class="taxi-gradient p-10 text-center rounded-b-[4rem] shadow-2xl border-b-4 border-yellow-500">
        <div class="w-20 h-20 bg-yellow-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-xl rotate-3">
            <i class="fa fa-taxi text-slate-900 text-4xl"></i>
        </div>
        <h1 class="text-4xl font-black italic text-white tracking-tighter uppercase">UZ <span class="text-yellow-500">TAXI</span></h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.5em] mt-2">Tezkor Buyurtma Tizimi</p>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-12">
        <div class="glass-card rounded-[3rem] shadow-2xl p-8 border border-white">
            <form id="orderForm" class="space-y-4">
                <div class="relative">
                    <i class="fa fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="userName" placeholder="Ism va Telefon" required 
                    class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-bold text-slate-700">
                </div>

                <div class="relative">
                    <i class="fa fa-location-arrow absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="userDest" placeholder="Qayerdan - Qayerga?" required 
                    class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-bold text-slate-700">
                </div>

                <div class="relative">
                    <i class="fa fa-list-ul absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <select id="userTarif" class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none font-bold text-slate-700 appearance-none">
                        <option value="Ekonom - 140,000">🚕 Ekonom (140,000 so'm)</option>
                        <option value="Komfort - 180,000" selected>✨ Komfort (180,000 so'm)</option>
                        <option value="Biznes - 250,000">👑 Biznes (250,000 so'm)</option>
                        <option value="Pochta - 60,000">📦 Pochta xizmati</option>
                    </select>
                </div>

                <textarea id="userMsg" placeholder="Izoh (yuk bormi?)" 
                class="w-full p-4 bg-slate-50 border-none rounded-2xl h-24 focus:ring-2 focus:ring-yellow-500 outline-none font-bold text-slate-700"></textarea>

                <button type="submit" id="submitBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black py-5 rounded-[2rem] text-xl shadow-xl active:scale-95 transition-all mt-4 uppercase">
                    Yo'lga chiqish <i class="fa fa-paper-plane ml-2"></i>
                </button>
            </form>
        </div>

        <a href="tel:+998946664042" class="mt-6 flex items-center justify-between bg-slate-800 text-white p-5 rounded-[2.5rem] shadow-lg border-b-4 border-slate-950 active:scale-95 transition">
            <div class="flex items-center gap-4 ml-2">
                <div class="bg-yellow-500 p-3 rounded-xl shadow-inner animate-pulse">
                    <i class="fa fa-phone-alt text-slate-900"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Haydovchi bilan bog'lanish</p>
                    <p class="font-black text-lg tracking-wider">94 666 40 42</p>
                </div>
            </div>
            <i class="fa fa-chevron-right mr-4 text-slate-600"></i>
        </a>
    </main>

    <footer class="text-center py-10">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">Uz Taxi Service 2026</p>
    </footer>

    <script>
        const BOT_TOKEN = "8777026295:AAF6wzaerpOem9_8Bm5QnZ4n0Kba-UZhrws";
        // Ikkala Chat ID ro'yxati
        const RECIPIENTS = ["8514630685", "5778369039"];

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            const name = document.getElementById('userName').value;
            const dest = document.getElementById('userDest').value;
            const tarif = document.getElementById('userTarif').value;
            const msg = document.getElementById('userMsg').value || "Yo'q";

            const text = `🚕 *UZ TAXI | YANGI BUYURTMA*\n\n` +
                         `👤 *Mijoz:* ${name}\n` +
                         `📍 *Manzil:* ${dest}\n` +
                         `🏷️ *Tarif:* ${tarif}\n` +
                         `💬 *Izoh:* ${msg}`;

            try {
                // Har bir ID ga alohida xabar yuborish
                for (const chatId of RECIPIENTS) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
                    });
                }

                alert("✅ Buyurtmangiz qabul qilindi!");
                location.reload();
            } catch (err) {
                alert("❌ Internet aloqasi yo'q yoki xatolik!");
                btn.disabled = false;
                btn.innerText = "Yo'lga chiqish";
            }
        };
    </script>
</body>
</html>
